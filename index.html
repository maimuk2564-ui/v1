                                </h3>
                                <div className="text-[9px] font-bold text-slate-500 bg-white/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white shadow-sm uppercase tracking-widest flex items-center gap-2">
                                    <span>เกณฑ์ใหม่ : A {`>=5,000`} | B 4,000-4,999 | C 3,000-3,999 | D 500-2,999 (บ./แผ่น)</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {['A', 'B', 'C', 'D'].map(g => {
                                    let dummyVal = 0;
                                    if (g === 'A') dummyVal = 5000;
                                    if (g === 'B') dummyVal = 4000;
                                    if (g === 'C') dummyVal = 3000;
                                    if (g === 'D') dummyVal = 500;

                                    const info = calculateGrade(dummyVal);
                                    const uniqueCount = aggregatedFarmers.filter(f => f.finalGrade === g).length;

                                    return <GradeSummaryCard key={g} gradeData={{...info, value: uniqueCount, range: info.range}} isSelected={selectedGrade === g} 
                                        onClick={() => { setSelectedGrade(selectedGrade === g ? null : g); setSelectedContinuity(null); }} 
                                    />;
                                })}
                            </div>
                        </div>

                        {/* Results Table Section */}
                        {activeFilterType && (
                            <div className="animate-fade-in-up glass-panel rounded-[2.5rem] overflow-hidden mb-12 relative">
                                <div className="absolute top-8 right-8 z-20 flex gap-3">
                                    <button 
                                        onClick={() => { setSelectedGrade(null); setSelectedContinuity(null); }} 
                                        className="flex items-center justify-center p-3.5 bg-white/80 hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-2xl transition-all shadow-sm border border-white"
                                        title="ปิดตาราง"
                                    >
                                        <X size={20} strokeWidth={2.5} />
                                    </button>
                                </div>

                                <div className="px-10 py-10 border-b border-white/50 bg-white/30 flex flex-col md:flex-row md:items-center justify-between gap-6 relative">
                                    <div>
                                        <h3 className="text-2xl font-bold text-slate-800 tracking-tight leading-none mb-2.5">
                                            {activeFilterType === 'grade' ? `รายชื่อเกษตรกร เกรด ${selectedGrade}` : `รายชื่อเกษตรกรที่เลี้ยงต่อเนื่อง ${selectedContinuity} รุ่น`}
                                        </h3>
                                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Listing Filtered Farmers Result</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center space-x-3 bg-white/60 border border-white px-6 py-3.5 rounded-2xl font-bold text-[10px] text-indigo-600 uppercase tracking-widest shadow-sm">
                                            <Activity size={18} strokeWidth={2.5} />
                                            <span>คลิกที่ชื่อเพื่อดูประวัติย้อนหลัง</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-sm">
                                        <thead>
                                            <tr className="bg-white/40 text-slate-500 font-bold text-[10px] uppercase tracking-[0.3em] border-b border-white">
                                                <th className="px-10 py-6">คุณ (นาย/นาง/นางสาว)</th>
                                                <th className="px-10 py-6 text-center">เดือนที่ขายรังไหม (รุ่น)</th>
                                                <th className="px-10 py-6 text-right">รายได้เฉลี่ย<br/><span className="text-[9px]">(บาท/แผ่น)</span></th>
                                                <th className="px-10 py-6 text-right">จำนวน<br/><span className="text-[9px]">(แผ่น)</span></th>
                                                <th className="px-10 py-6 text-right">รายได้รวม<br/><span className="text-[9px]">(บาท)</span></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/50">
                                            {aggregatedFarmers
                                                .filter(f => {
                                                    if (activeFilterType === 'grade') return f.finalGrade === selectedGrade;
                                                    if (activeFilterType === 'continuity') return f.cropCount === selectedContinuity;
                                                    return false;
                                                })
                                                .map((f, i) => (
                                                    <tr key={i} data-name={f.fullName} onClick={(e) => setViewingFarmer({ id: f.uniqueKey, name: f.fullName, clickY: e.pageY })} className="farmer-row hover:bg-white/60 cursor-pointer transition-all group border-l-0 hover:border-l-[10px] hover:border-indigo-400/80">
                                                        <td className="px-10 py-7">
                                                            <div className="font-bold text-slate-700 group-hover:text-indigo-600 transition-colors text-lg tracking-tight mb-2">คุณ {f.fullName}</div>
                                                            <div className="flex items-center space-x-2 opacity-80">
                                                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-white shadow-sm border border-slate-100 px-3 py-1 rounded-xl">{f.district}</span>
                                                                <span className={`text-[10px] font-bold ${f.variety.includes('เหลือง') ? 'text-amber-500 bg-amber-50 border-amber-100' : 'text-indigo-500 bg-indigo-50 border-indigo-100'} border px-2.5 py-1 rounded-xl uppercase tracking-widest shadow-sm`}>{f.variety}</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-10 py-7 text-center">
                                                            <div className="flex flex-wrap justify-center gap-2 max-w-[220px] mx-auto">
                                                                {sortMonths(f.monthsSold).map(m => (
                                                                    <span key={m} className="text-[9px] font-bold px-3 py-1.5 bg-white text-violet-600 rounded-xl whitespace-nowrap shadow-sm border border-slate-100">{m}</span>
                                                                ))}
                                                            </div>
                                                        </td>
                                                        <td className="px-10 py-7 text-right font-extrabold text-xl text-slate-700 tracking-tight tabular-nums">{Math.round(f.avgIncomePerSheet).toLocaleString()}</td>
                                                        <td className="px-10 py-7 text-right font-bold text-slate-500 tabular-nums">{f.totalSheets}</td>
                                                        <td className="px-10 py-7 text-right font-bold text-lg text-indigo-500/90 tabular-nums">{f.totalIncome.toLocaleString()}</td>
                                                    </tr>
                                                ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center mt-auto relative z-10 opacity-30">
                        <p className="font-bold text-slate-400 text-[10px] tracking-[0.3em] uppercase">นายณัฐนนท์ สุขไพศาลสกุล • Sericulture Smart Dashboard</p>
                    </footer>

                    {viewingFarmer && <FarmerModal farmerObj={viewingFarmer} allData={data} onClose={() => setViewingFarmer(null)} />}
                    {showInspector && <NameInspectorModal inspectorData={showInspector} allData={data} onClose={() => setShowInspector(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
